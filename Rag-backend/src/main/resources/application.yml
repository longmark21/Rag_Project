server:
  port: 8082  # 修改为 8082，避免与 Nginx 和其他服务冲突
  servlet:
    context-path: /api

spring:
  main:
    allow-circular-references: true  # 允许循环依赖
    
  application:
    name: rag-knowledge-base

  datasource:
    primary:
      jdbc-url: jdbc:mysql://192.168.31.29:3360/rag_knowledge?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      username: root
      password: abc
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    vector:
      jdbc-url: jdbc:postgresql://192.168.31.29:5434/rag_vector?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: postgres
      password: abc
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create  # 首次启动时自动创建表
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  data:
    redis:
      host: 192.168.31.29
      port: 6380
      password: abc
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms
      timeout: 3000ms

  ai:
    default-model: kimi
    dashscope:
      api-key: abc
      chat:
        enabled: true
        options:
          model: qwen-plus
          temperature: 0.7
          max-tokens: 2000
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
          dimensions: 1536
      image:
        enabled: false
    moonshot:
      api-key: abc
      base-url: https://api.moonshot.cn/v1
      chat:
        options:
          model: moonshot-v1-8k
          temperature: 0.1
          max-tokens: 500

spring-ai:
  alibaba:
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${spring.ai.dashscope.api-key}

  vectorstore:
    pgvector:
      dimension: 1536
      distance-type: cosine
      index-type: ivfflat
      index-list-size: 100
      max-connections: 10

file:
  upload:
    path: /vol1/1000/My-Rag-Project/uploads
    max-size: 524288000  # 500MB in bytes
    allowed-types: pdf,doc,docx,txt

text:
  chunk:
    size: 500
    overlap: 50
    max-chunk-size: 1000

rag:
  retrieval:
    top-k: 5
    score-threshold: 0.7
    max-context-length: 4000

  conversation:
    max-history: 10
    ttl: 3600

logging:
  level:
    root: INFO
    com.example.rag: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /vol1/1000/My-Rag-Project/logs/rag-knowledge-base.log
    max-size: 100MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
