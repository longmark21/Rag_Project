server:
  port: 8082
  servlet:
    context-path: /api

spring:
  main:
    allow-circular-references: true

  application:
    name: rag-knowledge-base

  datasource:
    primary:
      jdbc-url: jdbc:h2:mem:rag_knowledge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
      username: sa
      password:
      driver-class-name: org.h2.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    vector:
      jdbc-url: jdbc:h2:mem:rag_vector;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
      username: sa
      password:
      driver-class-name: org.h2.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 3000ms
      timeout: 3000ms

  ai:
    default-model: kimi
    dashscope:
      api-key: demo-key
      chat:
        enabled: true
        options:
          model: qwen-plus
          temperature: 0.7
          max-tokens: 2000
      embedding:
        enabled: true
        options:
          model: text-embedding-v2
          dimensions: 1536
      image:
        enabled: false
    moonshot:
      api-key: demo-key
      base-url: https://api.moonshot.cn/v1
      chat:
        options:
          model: moonshot-v1-8k
          temperature: 0.1
          max-tokens: 500

spring-ai:
  alibaba:
    dashscope:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${spring.ai.dashscope.api-key}

  vectorstore:
    pgvector:
      dimension: 1536
      distance-type: cosine
      index-type: ivfflat
      index-list-size: 100
      max-connections: 5

file:
  upload:
    path: ./uploads
    max-size: 524288000
    allowed-types: pdf,doc,docx,txt

text:
  chunk:
    size: 500
    overlap: 50
    max-chunk-size: 1000

rag:
  retrieval:
    top-k: 5
    score-threshold: 0.7
    max-context-length: 4000

  conversation:
    max-history: 10
    ttl: 3600

logging:
  level:
    root: INFO
    com.example.rag: DEBUG
    org.springframework.ai: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/rag-knowledge-base.log
    max-size: 100MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
